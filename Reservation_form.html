    <head>
        <meta charset="UTF-8">

        <title>Reservation Form</title>
    </head>
    <body>
    
        <h2  style="color: white;">Reserve a Table</h2>
    
        <section id="reservation">
            <div id="reservation-form">
                <form action="process_reservation.php" method="post" onsubmit="sendEmail(); reset(); return false"> <!-- Add the action attribute -->
                    <label for="name">Name:</label>
                    <input type="text" id="name" name="name" required>
    
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required>
    
                    <label for="phone">Phone:</label>
                    <input type="tel" id="phone" name="phone" required>
    
                    <label for="date">Date:</label>
                    <input type="date" id="date" name="date" required>
    
                    <label for="time">Time:</label>
                    <input type="time" id="time" name="time" required>
    
                    <label for="guests">Number of Guests:</label>
                    <select id="guests" name="guests" required>
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>

                    </form>
                </select>
                <button style="color: white;"button type="submit">Submit Reservation</button>

    <script src=" https://smtpjs.com/v3/smtp.js"></script>

        <script>
            function sendEmail(){
                Email.send({
    Host : "smtp.elasticemail.com",

}).then(
  message => alert(message)
);
            }
            function submitReservation() {
                const form = document.getElementById('reservationForm');
                const formData = new FormData(form);
                const xhr = new XMLHttpRequest();
    
                xhr.open('POST', '/process_reservation', true);
                xhr.setRequestHeader('Content-Type', 'application/x-www-form-urlencoded');
    
                xhr.onreadystatechange = function () {
                    if (xhr.readyState === 4) {
                        if (xhr.status === 200) {
                            alert('Reservation submitted successfully!');
                            form.reset();
                        } else {
                            alert('Failed to submit reservation. Please try again.');
                        }
                    }
                };
    
                xhr.send(new URLSearchParams(formData));
            }
        </script>
