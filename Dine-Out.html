<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Day Grill</title>
    <footer>
    <p>&copy; 2023 Game Day Grill</p>
</footer>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #180101;
        }

        header {
            background-color: #0e0d0d;
            color: #efe8e8;
            box-shadow: 0 50px 50px #e84d0b;
            text-align: center;
            padding: 1em;
        }

        nav {
            background-color: #0f0f0f;
            padding: 0.5em;
            text-align: center;
        }

        nav a {
            color: #e3502c;
            text-decoration: none;
            padding: 1em;
            margin: 0 1em;
        }

        section {
            padding: 2em;
        }

        footer {
            background-color: #333;
            color: #fff;
            text-align: center;
            padding: 1em;
            position: fixed;
            bottom: 0;
            width: 100%;
        }

        #order-form {
            max-width: 600px;
            margin: 0 auto;
        }

        #order-form label {
            display: block;
            margin-bottom: 8px;
        }

        #order-form input,
        #order-form select {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            box-sizing: border-box;
        }

        #order-form button {
            background-color: #f70909;
            color: #fff;
            padding: 10px 20px;
            border: none;
            cursor: pointer;
        }

        #order-form button:hover {
            background-color: #555;
        }
    </style>
</head>
<body>

    <header>
        <h1>Game Day Grill</h1>
    </header>

    <nav class="navbar">
        
        <list><a href="index.html">Home</a><list>
        <list><a href="Menu.html">Menu</a></list>
        </list><a href="Contact.html">Contact</a></list>
        </list><a href="Reservation_form.html">Reservation</a></list>
        <list><a href="Dine-Out.html">Dine-Out</a></list>
    </nav>



    
    <section id="reservation">
        

    <section id="Dine-Out">
        <h2  style="color: white;">Place an Online Order</h2>
        <div id="order-form">
            <form action="process_order.php" method="post">
                <label style="color: white;"label for="name">Name:</label>
                <input type="text" id="name" name="name" required>

                <label style="color: white;"label for="email">Email:</label>
                <input type="email" id="email" name="email" required>

                <label style="color: white;"label for="phone">Phone:</label>
                <input type="tel" id="phone" name="phone" required>


                <label style="color: white;"label for="menu-item">Select Menu Item:</label>
                <select style="color: rgb(11, 11, 11);"select id="menu-item" name="menu_item" required>
                    <option value="burger">Burger</option>
                    <option value="pizza">Pizza</option>
                    <option value="wings">Chicken Wings</option>
                    
                </select>

                <label style="color: white;"label for="quantity">Quantity:</label>
                <input type="number" id="quantity" name="quantity" min="1" required>

                <button style="color: white;"button type="submit">Place Order</button>
            </form>
        </div>

       
    </section>

</body>

   
</html>
